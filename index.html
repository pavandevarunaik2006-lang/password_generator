<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Password Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: #667eea;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        input[type="checkbox"] {
            width: 20px;
            height: 20px;
            margin-right: 10px;
            cursor: pointer;
        }

        .checkbox-group label {
            margin: 0;
            cursor: pointer;
            font-weight: 400;
        }

        .generate-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            margin-top: 10px;
        }

        .generate-btn:hover {
            transform: translateY(-2px);
        }

        .generate-btn:active {
            transform: translateY(0);
        }

        .result {
            margin-top: 25px;
            padding: 20px;
            background: #f0f4ff;
            border-radius: 8px;
            display: none;
        }

        .result.show {
            display: block;
        }

        .password-display {
            background: white;
            padding: 15px;
            border-radius: 8px;
            border: 2px solid #667eea;
            font-family: 'Courier New', monospace;
            font-size: 18px;
            word-break: break-all;
            margin-bottom: 15px;
            text-align: center;
            color: #333;
        }

        .copy-btn {
            width: 100%;
            padding: 12px;
            background: #4caf50;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .copy-btn:hover {
            background: #45a049;
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
        }

        .error.show {
            display: block;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
            display: none;
            text-align: center;
        }

        .success-message.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Password Generator</h1>
        <p class="subtitle">Create strong and secure passwords</p>

        <form id="passwordForm">
            <div class="form-group">
                <label for="length">Password Length (4-128)</label>
                <input type="number" id="length" name="length" value="16" min="4" max="128" required>
            </div>

            <div class="form-group">
                <label>Character Types:</label>
                <div class="checkbox-group">
                    <input type="checkbox" id="uppercase" name="uppercase" checked>
                    <label for="uppercase">Uppercase Letters (A-Z)</label>
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="lowercase" name="lowercase" checked>
                    <label for="lowercase">Lowercase Letters (a-z)</label>
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="digits" name="digits" checked>
                    <label for="digits">Numbers (0-9)</label>
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="special" name="special" checked>
                    <label for="special">Special Characters (!@#$%...)</label>
                </div>
            </div>

            <button type="submit" class="generate-btn">Generate Password</button>
        </form>

        <div class="error" id="error"></div>

        <div class="result" id="result">
            <div class="password-display" id="password"></div>
            <button class="copy-btn" id="copyBtn">📋 Copy to Clipboard</button>
            <div class="success-message" id="successMessage">✅ Password copied!</div>
        </div>
    </div>

    <script>
        const form = document.getElementById('passwordForm');
        const resultDiv = document.getElementById('result');
        const passwordDiv = document.getElementById('password');
        const errorDiv = document.getElementById('error');
        const copyBtn = document.getElementById('copyBtn');
        const successMessage = document.getElementById('successMessage');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Hide previous results
            errorDiv.classList.remove('show');
            resultDiv.classList.remove('show');
            successMessage.classList.remove('show');

            const formData = {
                length: parseInt(document.getElementById('length').value),
                uppercase: document.getElementById('uppercase').checked,
                lowercase: document.getElementById('lowercase').checked,
                digits: document.getElementById('digits').checked,
                special: document.getElementById('special').checked
            };

            try {
                const response = await fetch('/generate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });

                const data = await response.json();

                if (data.success) {
                    passwordDiv.textContent = data.password;
                    resultDiv.classList.add('show');
                } else {
                    errorDiv.textContent = data.error;
                    errorDiv.classList.add('show');
                }
            } catch (error) {
                errorDiv.textContent = 'Error generating password. Please try again.';
                errorDiv.classList.add('show');
            }
        });

        copyBtn.addEventListener('click', () => {
            const password = passwordDiv.textContent;
            navigator.clipboard.writeText(password).then(() => {
                successMessage.classList.add('show');
                setTimeout(() => {
                    successMessage.classList.remove('show');
                }, 2000);
            });
        });
    </script>
</body>
</html>
